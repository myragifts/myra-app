<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>
MYRA | Where Every Gift Tells A Story
</title>

<meta
name="theme-color"
content="#2C1A0B">

<meta
name="apple-mobile-web-app-capable"
content="yes">

<meta
name="mobile-web-app-capable"
content="yes">

<link
rel="manifest"
href="manifest.json">

<link
href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<script src="config.js"></script>

<style>

/* ==========================================
   RESET
========================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

:root{

--bg:#F8F5F0;
--card:#FFFFFF;
--text:#2C1A0B;

--gold:#D4AF37;
--gold-dark:#B68B1E;

--border:#E8E0D3;
--muted:#7D7468;

--shadow:
0 20px 60px rgba(0,0,0,.08);

}

/* ==========================================
   BASE
========================================== */

html{
scroll-behavior:smooth;
}

body{

font-family:
'Cormorant Garamond',
serif;

background:
var(--bg);

color:
var(--text);

min-height:
100vh;

overflow-x:hidden;

}

body.loading{
visibility:hidden;
}

/* ==========================================
   PAGE
========================================== */

.login-page{

min-height:100vh;

display:grid;

grid-template-columns:
1.2fr 1fr;

}

/* ==========================================
   HERO
========================================== */

.hero-side{

position:relative;

min-height:100vh;

background:

linear-gradient(
rgba(20,16,12,.35),
rgba(20,16,12,.55)
),

url(
"https://images.unsplash.com/photo-1512909006721-3d6018887383?q=80&w=1600&auto=format&fit=crop"
)

center center/cover no-repeat;

}

.hero-overlay{

position:absolute;

inset:0;

display:flex;

align-items:flex-end;

padding:60px;

}

.hero-content{

max-width:520px;

color:#FFFFFF;

}

.hero-logo{

font-size:90px;

font-weight:700;

letter-spacing:8px;

line-height:1;

}

.hero-tag{

margin-top:12px;

font-size:24px;

font-weight:500;

line-height:1.3;

}

.hero-desc{

margin-top:20px;

font-size:18px;

line-height:1.7;

opacity:.95;

}

/* ==========================================
   LOGIN SIDE
========================================== */

.login-side{

display:flex;

align-items:center;

justify-content:center;

padding:50px;

background:

linear-gradient(
180deg,
#FBF8F3,
#F8F5F0
);

}

.login-card{

width:100%;

max-width:520px;

background:
rgba(255,255,255,.94);

backdrop-filter:
blur(12px);

border:
1px solid rgba(212,175,55,.18);

border-radius:
34px;

padding:
42px 34px;

box-shadow:
var(--shadow);

}

/* ==========================================
   BRAND
========================================== */

.brand-top{
text-align:center;
}

.brand-circle{

width:92px;
height:92px;

margin:auto;

border-radius:50%;

background:

linear-gradient(
135deg,
#F2DE8B,
#D4AF37
);

display:flex;
align-items:center;
justify-content:center;

box-shadow:
0 10px 30px rgba(212,175,55,.28);

}

.brand-circle span{

font-size:42px;
font-weight:700;
color:#2C1A0B;

}

.brand-name{

margin-top:18px;

font-size:56px;

font-weight:700;

letter-spacing:6px;

}

.brand-tagline{

margin-top:6px;

font-size:18px;

color:var(--muted);

}

.gold-divider{

width:140px;

height:1px;

margin:24px auto;

background:

linear-gradient(
90deg,
transparent,
var(--gold),
transparent
);

}

/* ==========================================
   WELCOME
========================================== */

.welcome{

text-align:center;

margin-bottom:28px;

}

.welcome h2{

font-size:42px;

font-weight:600;

}

.welcome p{

margin-top:8px;

font-size:18px;

color:var(--muted);

line-height:1.5;

}

/* ==========================================
   FORM
========================================== */

.input-box{

height:62px;

display:flex;

align-items:center;

border:1px solid var(--border);

background:#FFFFFF;

border-radius:18px;

padding:0 18px;

margin-bottom:16px;

transition:.25s;

}

.input-box:focus-within{

border-color:var(--gold);

box-shadow:
0 0 0 5px rgba(212,175,55,.10);

}

.input-icon{

font-size:22px;

margin-right:12px;

}

.input-box input{

flex:1;

border:none;

outline:none;

background:transparent;

font-family:
'Cormorant Garamond',
serif;

font-size:20px;

color:var(--text);

}

.input-box input::placeholder{
color:#999999;
}
